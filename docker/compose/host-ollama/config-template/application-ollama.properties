# Host Ollama 本地模型配置
# 首次部署时复制到 .data/config/application-ollama.properties 后按宿主机模型修改

spring.ai.model.chat=ollama
spring.ai.model.embedding=ollama

# ======================================================================================================================
# ================================================== Ollama Provider ===================================================
# ======================================================================================================================
# Java 应用运行在容器内，Ollama 运行在宿主机
# Linux Docker Engine 通过 docker-compose.yml 中的 host-gateway 映射访问宿主机
spring.ai.ollama.base-url=http://host.docker.internal:11434

# Ollama Chat 模型
# model 必须与宿主机 ollama list 中的模型名一致
spring.ai.ollama.chat.options.model=qwen3.6:35b
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.top-p=0.9
spring.ai.ollama.chat.options.top-k=40
spring.ai.ollama.chat.options.num-predict=2048
spring.ai.ollama.chat.options.num-ctx=8192
spring.ai.ollama.chat.options.repeat-penalty=1.1
spring.ai.ollama.chat.options.keep-alive=10m

# Ollama Embedding 模型
# bge-m3 常见输出维度为 1024，切换模型后必须重建向量库索引
spring.ai.ollama.embedding.options.model=bge-m3
spring.ai.ollama.embedding.options.keep-alive=10m
spring.ai.ollama.embedding.options.truncate=true

# 模型由宿主机 Ollama 提前准备
# 应用启动时不自动拉模型，避免启动被下载阻塞
spring.ai.ollama.init.pull-model-strategy=never
spring.ai.ollama.init.timeout=5m
spring.ai.ollama.init.max-retries=0
spring.ai.ollama.init.chat.include=false
spring.ai.ollama.init.embedding.include=false
