# MetaAI Host Ollama 部署栈公共配置
# 首次部署时复制到 .data/config/application.properties 后按现场环境修改

spring.application.name=Meta-AI-AGENT
server.port=8008

# 当前部署栈使用宿主机 Ollama 模型服务
# profile 专属模型配置位于 application-ollama.properties
spring.profiles.active=ollama

# ======================================================================================================================
# ================================================= Application / Web ==================================================
# ======================================================================================================================
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.charset=UTF-8
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB

# 生产环境必须替换默认 token
metax.ai.security.api-token=sk-metax-123456

# prompt 查找位置按顺序生效，Docker 外部目录优先，jar 内置 classpath 模板兜底
metax.ai.prompt.locations=file:/app/prompts/,classpath:/prompts/

# 应用日志写入 Compose 挂载目录
logging.file.path=/root/logs

# ======================================================================================================================
# ================================================== Knife4j / OpenAPI =================================================
# ======================================================================================================================
knife4j.enable=true
knife4j.setting.language=zh_cn
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true

# ======================================================================================================================
# ============================================= Spring AI Global Strategy ==============================================
# ======================================================================================================================
# 当前项目自行声明基础 ChatClient，关闭框架默认 ChatClient 自动装配
spring.ai.chat.client.enabled=false

# 当前运行环境只启用 ChatModel 和 EmbeddingModel
# 语音、图片和审核模型显式关闭，避免 OpenAI starter 辅助模型误启用
spring.ai.model.audio.speech=none
spring.ai.model.audio.transcription=none
spring.ai.model.image=none
spring.ai.model.moderation=none

# 可选值：redis、qdrant
# 切换向量库或 embedding 模型后必须重建索引并重新入库
spring.ai.vectorstore.type=qdrant

# 生产环境避免输出 prompt / completion 敏感内容
logging.level.org.springframework.ai.chat.client.advisor=INFO
metax.debug.print-ai-beans=true

# ======================================================================================================================
# ======================================================= Redis ========================================================
# ======================================================================================================================
# Redis VectorStore 必须使用 Redis Stack，普通 Redis 不包含 RediSearch / RedisJSON 模块
# 这里使用 Compose 内部服务名，宿主机端口 18003 只用于本机排查
spring.data.redis.host=redis-stack
spring.data.redis.port=6379
spring.data.redis.username=default
spring.data.redis.password=123456
spring.data.redis.timeout=5000
spring.data.redis.connect-timeout=5000
spring.data.redis.client-type=JEDIS

# ======================================================================================================================
# ================================================== Chat Memory =======================================================
# ======================================================================================================================
# Redis ChatMemory 负责低延迟会话上下文
# JDBC ChatMemory 和 MetaChatHistory 使用外部 PostgreSQL
metax.ai.chat.memory.max-messages=30
spring.ai.chat.memory.repository.jdbc.initialize-schema=never
spring.ai.chat.memory.repository.jdbc.platform=postgresql

# ======================================================================================================================
# ===================================================== PostgreSQL =====================================================
# ======================================================================================================================
# PostgreSQL 是外部已存在数据库，不在本 Compose 中编排
# Linux 宿主机数据库可配合 Compose extra_hosts 使用 host.docker.internal
spring.datasource.url=jdbc:postgresql://postgres:5432/pikb
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.pool-name=MetaAI-HikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# 生产环境建议 validate，不让应用自动修改数据库结构
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# ======================================================================================================================
# ================================================= Redis VectorStore ==================================================
# ======================================================================================================================
# 开发或首次部署可开启自动初始化
# 生产环境如已有受控建索引流程，可改为 false
spring.ai.vectorstore.redis.initialize-schema=true
spring.ai.vectorstore.redis.index-name=metax-rag-index
spring.ai.vectorstore.redis.prefix=metax:rag:

# ======================================================================================================================
# ================================================ Qdrant VectorStore ==================================================
# ======================================================================================================================
# Qdrant gRPC 端口为 6334
# 将 spring.ai.vectorstore.type 改为 qdrant 后启用
spring.ai.vectorstore.qdrant.host=qdrant
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.api-key=
spring.ai.vectorstore.qdrant.use-tls=false
spring.ai.vectorstore.qdrant.initialize-schema=true
spring.ai.vectorstore.qdrant.collection-name=metax_rag_qdrant

# ======================================================================================================================
# =============================================== RAG ETL / Retrieval ==================================================
# ======================================================================================================================
metax.ai.retrieval.chunk.size=800
metax.ai.retrieval.chunk.min-chars=350
metax.ai.retrieval.chunk.min-length-to-embed=20
metax.ai.retrieval.chunk.max-num-chunks=10000
metax.ai.retrieval.chunk.keep-separator=true
metax.ai.retrieval.vector-store.write-batch-size=10

# PaddleX OCR 负责扫描版 PDF 和图片识别
# OCR 服务使用 Compose 内部服务名，不走宿主机 18009 端口
metax.ai.retrieval.ocr.enabled=true
metax.ai.retrieval.ocr.provider=paddle
metax.ai.retrieval.ocr.base-url=http://paddlex-ocr:8080
metax.ai.retrieval.ocr.endpoint=/ocr
metax.ai.retrieval.ocr.timeout=900s
metax.ai.retrieval.ocr.visualize=false

# ETL 快照默认关闭，避免生产环境把知识库内容落盘
metax.ai.retrieval.snapshot.enabled=false
metax.ai.retrieval.snapshot.output-dir=/root/logs/rag-snapshots
metax.ai.retrieval.snapshot.with-document-markers=true
metax.ai.retrieval.snapshot.metadata-mode=ALL
metax.ai.retrieval.snapshot.append=false

metax.ai.retrieval.search.top-k=8
metax.ai.retrieval.search.similarity-threshold=0.68
metax.ai.retrieval.search.allow-empty-context=true
metax.ai.retrieval.search.permission-filter-enabled=false
metax.ai.retrieval.search.decision.mode=hybrid
metax.ai.retrieval.search.decision.temperature=0.0
metax.ai.retrieval.search.decision.max-tokens=30
metax.ai.retrieval.search.query-transformer.enabled=false
metax.ai.retrieval.search.query-transformer.mode=none
metax.ai.retrieval.search.query-transformer.temperature=0.0
metax.ai.retrieval.search.query-transformer.max-tokens=512
metax.ai.retrieval.search.query-transformer.target-search-system=vector store
metax.ai.retrieval.search.post-processor.enabled=true
metax.ai.retrieval.search.post-processor.deduplicate-enabled=true
metax.ai.retrieval.search.post-processor.rerank-enabled=false
metax.ai.retrieval.search.post-processor.min-context-score=0.68
metax.ai.retrieval.search.post-processor.max-chunks-per-document=2
metax.ai.retrieval.search.post-processor.max-context-documents=3
metax.ai.retrieval.search.post-processor.max-context-chars=12000
metax.ai.retrieval.search.observability.enabled=true
metax.ai.retrieval.reference.min-reference-score=0.70
metax.ai.retrieval.reference.max-references=3
metax.ai.retrieval.reference.min-chunks-per-reference=1
metax.ai.retrieval.indexing.redis-key-prefix=retrieval:indexing:run:
metax.ai.retrieval.indexing.run-ttl-seconds=86400

# ======================================================================================================================
# ================================================= RAG Object Storage =================================================
# ======================================================================================================================
# RustFS 使用 S3 兼容协议保存 RAG 原始文件
# access-key / secret-key 必须与 .env 中 RustFS 服务配置保持一致
metax.ai.retrieval.storage.provider=object
metax.ai.retrieval.storage.endpoint=http://rustfs:9000
metax.ai.retrieval.storage.bucket=meta-ai-knowledge
metax.ai.retrieval.storage.initialize-bucket=true
metax.ai.retrieval.storage.access-key=admin
metax.ai.retrieval.storage.secret-key=Xc.123456
metax.ai.retrieval.storage.region=us-east-1

# ======================================================================================================================
# ============================================ External Document Adapter ===============================================
# ======================================================================================================================
# 第三方系统文档同步适配器
# 首次联调建议只开启通知入队接口，确认老系统能推送文件 ID 后再开启 Worker 和补偿扫描
metax.external-adapter.enabled=true
metax.external-adapter.tenant-id=t1
metax.external-adapter.kb-id=kb1
metax.external-adapter.max-attempts=3

# 后台 Worker 负责下载、对象存储归档、提交索引和等待索引终态
# 已确认老系统能推送文件 ID 后开启 Worker，继续验证下载、归档、索引和状态回写链路
metax.external-adapter.worker.enabled=true
metax.external-adapter.worker.idle-interval=5s
metax.external-adapter.worker.lock-timeout=30m
metax.external-adapter.worker.index-timeout=30m
metax.external-adapter.worker.index-poll-initial-interval=2s
metax.external-adapter.worker.index-poll-max-interval=10s
metax.external-adapter.worker.index-poll-multiplier=1.5

# 第三方老系统独立文件服务
# 对应老系统 fsip.config.host，Docker 内优先通过 host.docker.internal 访问宿主机文件服务
metax.external-adapter.file-service.host=http://host.docker.internal:10086
metax.external-adapter.file-service.download-url=/v1/download/
metax.external-adapter.file-service.authorization=123010068
metax.external-adapter.file-service.timeout=5m

# 调用 MetaAI 自身对象存储文档接口
metax.external-adapter.storage-api.base-url=http://meta-ai-agent:8008
metax.external-adapter.storage-api.auto-index=true
metax.external-adapter.storage-api.upload-timeout=10m

# 补偿扫描会定时扫描历史漏通知文件，确认链路稳定后再开启
metax.external-adapter.reconcile.enabled=false
metax.external-adapter.reconcile.batch-size=500
metax.external-adapter.reconcile.fixed-delay-millis=300000
