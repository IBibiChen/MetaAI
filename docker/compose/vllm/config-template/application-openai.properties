# vLLM OpenAI 兼容模型配置
# 首次部署时复制到 .data/config/application-openai.properties 后按现场模型修改

spring.ai.model.chat=openai
spring.ai.model.embedding=openai

# ======================================================================================================================
# ================================================== OpenAI Provider ===================================================
# ======================================================================================================================
# OpenAI base-url 不包含 /v1
# /v1/chat/completions 和 /v1/embeddings 由下面 path 配置追加
spring.ai.openai.base-url=http://vllm-chat:8000
spring.ai.openai.api-key=not-needed

# vLLM Chat 服务地址
# model 必须与 .env 中 VLLM_CHAT_SERVED_MODEL 保持一致
# 默认值面向 2 张 RTX 4090 上的 Qwen3.6-27B
spring.ai.openai.chat.base-url=http://vllm-chat:8000
spring.ai.openai.chat.completions-path=/v1/chat/completions
spring.ai.openai.chat.options.model=Qwen3.6-27B
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.top-p=0.9
spring.ai.openai.chat.options.max-tokens=2048

# vLLM Embedding 服务地址
# model 必须与 .env 中 VLLM_EMBEDDING_SERVED_MODEL 保持一致
# bge-m3 输出维度为 1024，切换模型或 revision 后必须重建向量索引
# 模型权重版本由 .env 中 VLLM_EMBEDDING_REVISION 固定
spring.ai.openai.embedding.base-url=http://vllm-embedding:8000
spring.ai.openai.embedding.embeddings-path=/v1/embeddings
spring.ai.openai.embedding.metadata-mode=EMBED
spring.ai.openai.embedding.options.model=bge-m3

