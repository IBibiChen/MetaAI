spring.application.name=Meta-AI-AGENT

server.port=8008

# ======================================================================================================================
# ================================================= Application / Web ==================================================
# ======================================================================================================================
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.charset=UTF-8

# ======================================================================================================================
# ============================================= Spring AI Global Strategy ==============================================
# ======================================================================================================================
# 多 ChatModel 共存时关闭 ChatClient.Builder 自动装配，改由 ChatClientConfig 按具体 ChatModel 手动构造
spring.ai.chat.client.enabled=false

# 不要配置 spring.ai.model.chat
# 该属性是 ChatModel provider 单选开关，设置后会关闭未选中的 provider 自动装配
# 当前项目需要 DashScope / Ollama / OpenAI 三套 ChatModel 同时存在

# 不要配置 spring.ai.model.embedding
# 该属性是 EmbeddingModel provider 单选开关，设置后会关闭未选中的 provider 自动装配
# 当前项目需要 DashScope / Ollama / OpenAI 三套 EmbeddingModel 同时存在

# Advisor 日志仅建议开发环境开启，生产环境避免输出 prompt / completion 敏感内容
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# ======================================================================================================================
# ================================================= DashScope Provider =================================================
# ======================================================================================================================
spring.ai.dashscope.enabled=true
spring.ai.dashscope.api-key=${DASH_SCOPE_API_KEY}
spring.ai.dashscope.base-url=https://dashscope.aliyuncs.com
spring.ai.dashscope.read-timeout=60000

# DashScope Chat
spring.ai.dashscope.chat.enabled=true
spring.ai.dashscope.chat.options.model=qwen-plus
spring.ai.dashscope.chat.options.temperature=0.7
spring.ai.dashscope.chat.options.top-p=0.8
spring.ai.dashscope.chat.options.top-k=50
spring.ai.dashscope.chat.options.max-tokens=2048
spring.ai.dashscope.chat.options.enable-search=false
spring.ai.dashscope.chat.options.incremental-output=true
spring.ai.dashscope.chat.options.repetition-penalty=1.1

# DashScope Embedding
spring.ai.dashscope.embedding.enabled=true
spring.ai.dashscope.embedding.metadata-mode=EMBED
spring.ai.dashscope.embedding.options.model=text-embedding-v3
# text-embedding-v3 支持按需指定维度，不需要时留空不要配置
# spring.ai.dashscope.embedding.options.dimensions=1024
# text_type 可按写入 / 查询场景在调用侧覆盖，默认不固定
# spring.ai.dashscope.embedding.options.text-type=document

# ======================================================================================================================
# ================================================== Ollama Provider ===================================================
# ======================================================================================================================
spring.ai.ollama.base-url=http://localhost:11434

# Ollama Chat
spring.ai.ollama.chat.options.model=qwen2.5:7b
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.top-p=0.9
spring.ai.ollama.chat.options.top-k=40
spring.ai.ollama.chat.options.num-predict=2048
spring.ai.ollama.chat.options.num-ctx=8192
spring.ai.ollama.chat.options.repeat-penalty=1.1
spring.ai.ollama.chat.options.keep-alive=10m

# Ollama Embedding
spring.ai.ollama.embedding.options.model=nomic-embed-text
spring.ai.ollama.embedding.options.keep-alive=10m
spring.ai.ollama.embedding.options.truncate=true

# Ollama Model Initialization
# 生产环境不建议启动时自动拉模型，避免应用启动被模型下载阻塞
spring.ai.ollama.init.pull-model-strategy=never
spring.ai.ollama.init.timeout=5m
spring.ai.ollama.init.max-retries=0
spring.ai.ollama.init.chat.include=true
spring.ai.ollama.init.embedding.include=true

# ======================================================================================================================
# ================================================== OpenAI Provider ===================================================
# ======================================================================================================================
# 可对接 OpenAI 官方 API，也可对接 vLLM / TEI / LocalAI 等 OpenAI 兼容服务
spring.ai.openai.base-url=http://localhost:8000/v1
spring.ai.openai.api-key=not-needed

# OpenAI Chat
spring.ai.openai.chat.base-url=http://localhost:8000/v1
spring.ai.openai.chat.completions-path=/v1/chat/completions
spring.ai.openai.chat.options.model=Qwen2.5-7B-Instruct
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.top-p=0.9
spring.ai.openai.chat.options.max-tokens=2048

# OpenAI Embedding
spring.ai.openai.embedding.base-url=http://localhost:8080/v1
spring.ai.openai.embedding.embeddings-path=/v1/embeddings
spring.ai.openai.embedding.metadata-mode=EMBED
spring.ai.openai.embedding.options.model=text-embedding-v3
# 对接 text-embedding-3 或兼容服务需要固定维度时再打开
# spring.ai.openai.embedding.options.dimensions=1024

# vLLM / OpenAI-compatible extra body examples
# spring.ai.openai.chat.options.extra-body.top_k=40
# spring.ai.openai.chat.options.extra-body.repetition_penalty=1.1

# ======================================================================================================================
# ======================================================= Redis ========================================================
# ======================================================================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6399
spring.data.redis.username=default
spring.data.redis.password=123456
spring.data.redis.timeout=5000

# ======================================================================================================================
# ================================================= Redis VectorStore ==================================================
# ======================================================================================================================
# 开发环境可自动初始化 schema，生产环境建议改为 false 并通过受控迁移流程创建索引
spring.ai.vectorstore.redis.initialize-schema=true

# 三套 RedisVectorStore 共用 metadata 字段规范
# TAG：tenantId、knowledgeBaseId、documentId、documentType
# TEXT：source
# NUMERIC：createdAt
# 写入 Document.metadata 示例
# tenantId=t1
# knowledgeBaseId=kb1
# documentId=doc-001
# documentType=markdown
# source=docs/spring-ai/redis.md
# createdAt=1710000000000
# filterExpression 示例
# tenantId == 't1' && knowledgeBaseId == 'kb1'
# documentType == 'markdown' && createdAt >= 1710000000000

metax.ai.vectorstore.dashscope.index-name=metax-dashscope-index
metax.ai.vectorstore.dashscope.prefix=dashscope:rag:

metax.ai.vectorstore.ollama.index-name=metax-ollama-index
metax.ai.vectorstore.ollama.prefix=ollama:rag:

metax.ai.vectorstore.openai.index-name=metax-openai-index
metax.ai.vectorstore.openai.prefix=openai:rag:
