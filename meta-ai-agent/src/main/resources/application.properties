spring.application.name=Meta-AI-AGENT

server.port=8008

# ======================================================================================================================
# ================================================= Application / Web ==================================================
# ======================================================================================================================
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.charset=UTF-8
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB

# ======================================================================================================================
# ================================================== Knife4j / OpenAPI =================================================
# ======================================================================================================================
# Knife4j 页面入口：/doc.html
# OpenAPI JSON 入口：/v3/api-docs
knife4j.enable=true
knife4j.setting.language=zh_cn
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true

# ======================================================================================================================
# ============================================= Spring AI Global Strategy ==============================================
# ======================================================================================================================
# 当前项目自行声明一个基础 chatClient
# 关闭 ChatClient.Builder 自动装配，避免框架再创建一个默认 ChatClient 造成选择歧义
spring.ai.chat.client.enabled=false

# 当前运行环境只启用一套 ChatModel、一套 EmbeddingModel 和一套 VectorStore
# 默认 ChatClient 显式绑定 redisChatMemory，完整用户历史由 ChatHistory 独立归档
# 切换模型 provider 时同步修改 spring.ai.model.chat 和 spring.ai.model.embedding
# 可选值示例：dashscope、openai、ollama
spring.ai.model.chat=ollama
spring.ai.model.embedding=ollama

# 当前运行环境只启用一套向量库，官方自动配置按 spring.ai.vectorstore.type 创建默认 vectorStore Bean
# 可选值示例：redis、qdrant、milvus
# spring.ai.vectorstore.type 来自 Spring AI 官方 SpringAIVectorStoreTypes.TYPE 常量
# Redis / Qdrant / Milvus 自动配置都用该属性做互斥启用条件
# redis 由 MetaRedisVectorStoreConfig 轻量覆盖 metadataFields，其余向量库走 Spring AI 官方自动装配
spring.ai.vectorstore.type=redis

# Advisor 日志仅建议开发环境开启，生产环境避免输出 prompt / completion 敏感内容
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# ======================================================================================================================
# ================================================= DashScope Provider =================================================
# ======================================================================================================================
spring.ai.dashscope.api-key=${DASH_SCOPE_API_KEY}
spring.ai.dashscope.base-url=https://dashscope.aliyuncs.com
spring.ai.dashscope.read-timeout=60000

# DashScope Chat
spring.ai.dashscope.chat.options.model=qwen-plus
spring.ai.dashscope.chat.options.temperature=0.7
spring.ai.dashscope.chat.options.top-p=0.8
spring.ai.dashscope.chat.options.top-k=50
spring.ai.dashscope.chat.options.max-tokens=2048
spring.ai.dashscope.chat.options.enable-search=false
spring.ai.dashscope.chat.options.incremental-output=true
spring.ai.dashscope.chat.options.repetition-penalty=1.1

# DashScope Embedding
spring.ai.dashscope.embedding.metadata-mode=EMBED
spring.ai.dashscope.embedding.options.model=text-embedding-v3
# text-embedding-v3 支持按需指定维度，不需要时留空不要配置
# spring.ai.dashscope.embedding.options.dimensions=1024
# text_type 可按写入 / 查询场景在调用侧覆盖，默认不固定
# spring.ai.dashscope.embedding.options.text-type=document

# ======================================================================================================================
# ================================================== Ollama Provider ===================================================
# ======================================================================================================================
spring.ai.ollama.base-url=http://localhost:11434

# Ollama Chat
# 当前本地默认 ChatModel 使用 qwen3.6:35b，对应本机 Ollama 已下载模型
spring.ai.ollama.chat.options.model=qwen3.6:35b
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.top-p=0.9
spring.ai.ollama.chat.options.top-k=40
spring.ai.ollama.chat.options.num-predict=2048
spring.ai.ollama.chat.options.num-ctx=8192
spring.ai.ollama.chat.options.repeat-penalty=1.1
spring.ai.ollama.chat.options.keep-alive=10m

# Ollama Embedding
# 当前本地默认 EmbeddingModel 使用 bge-m3，适合中文和多语言 RAG 检索
# bge-m3 常见输出维度为 1024，切换 embedding 模型后必须重建向量库索引
spring.ai.ollama.embedding.options.model=bge-m3
spring.ai.ollama.embedding.options.keep-alive=10m
spring.ai.ollama.embedding.options.truncate=true

# Ollama Model Initialization
# 生产环境不建议启动时自动拉模型，避免应用启动被模型下载阻塞
spring.ai.ollama.init.pull-model-strategy=never
spring.ai.ollama.init.timeout=5m
spring.ai.ollama.init.max-retries=0
spring.ai.ollama.init.chat.include=false
spring.ai.ollama.init.embedding.include=false

# ======================================================================================================================
# ================================================== OpenAI Provider ===================================================
# ======================================================================================================================
# 可对接 OpenAI 官方 API，也可对接 vLLM / TEI / LocalAI 等 OpenAI 兼容服务
spring.ai.openai.base-url=http://localhost:8000/v1
spring.ai.openai.api-key=not-needed

# OpenAI Chat
spring.ai.openai.chat.base-url=http://localhost:8000/v1
spring.ai.openai.chat.completions-path=/v1/chat/completions
spring.ai.openai.chat.options.model=Qwen2.5-7B-Instruct
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.top-p=0.9
spring.ai.openai.chat.options.max-tokens=2048

# OpenAI Embedding
spring.ai.openai.embedding.base-url=http://localhost:8080/v1
spring.ai.openai.embedding.embeddings-path=/v1/embeddings
spring.ai.openai.embedding.metadata-mode=EMBED
spring.ai.openai.embedding.options.model=text-embedding-v3
# 对接 text-embedding-3 或兼容服务需要固定维度时再打开
# spring.ai.openai.embedding.options.dimensions=1024

# vLLM / OpenAI-compatible extra body examples
# spring.ai.openai.chat.options.extra-body.top_k=40
# spring.ai.openai.chat.options.extra-body.repetition_penalty=1.1

# ======================================================================================================================
# ======================================================= Redis ========================================================
# ======================================================================================================================
# Redis VectorStore 必须使用 Redis Stack，普通 Redis 不包含 RediSearch / RedisJSON 模块
# 错误命令示例：不要追加 redis-server --requirepass，否则会覆盖 Redis Stack 默认启动入口，导致 FT._LIST 不存在
# 正确命令示例：docker run -d --name redis-stack-server -p 6399:6379 -e REDIS_ARGS="--requirepass 123456" redis/redis-stack-server:latest
# docker run -d --name redis-stack -p 6399:6379 -p 8001:8001 -v ${PWD}\docker-data\redis-stack:/data -e REDIS_ARGS="--requirepass 123456" redis/redis-stack:7.4.0-v8
# 验证 RediSearch：docker exec -it redis-stack-server redis-cli -a 123456 FT._LIST
# 验证模块列表：docker exec -it redis-stack-server redis-cli -a 123456 MODULE LIST
# FT._LIST
# FT.INFO metax-rag-index
# FT.SEARCH metax-rag-index "*" LIMIT 0 3
# FT.SEARCH metax-rag-index "@tenantId:{t1} @knowledgeBaseId:{kb1}" LIMIT 0 3
# FT.DROPINDEX metax-rag-index
# FT.DROPINDEX metax-rag-index DD
spring.data.redis.host=localhost
spring.data.redis.port=6399
spring.data.redis.username=default
spring.data.redis.password=123456
spring.data.redis.timeout=5000
spring.data.redis.connect-timeout=5000
spring.data.redis.client-type=JEDIS

# Redis 客户端边界
# RedisTemplate：普通 Redis KV / Hash / List 数据访问
# JedisPooled：Spring AI RedisVectorStore 向量库专用客户端
# RedisVectorStore 需要 JedisConnectionFactory，缺少 VectorStore Bean 时优先检查 client-type 是否为 JEDIS

# ======================================================================================================================
# ================================================== Chat Memory =======================================================
# ======================================================================================================================
# 当前项目保留 Redis / JDBC 两套 ChatMemory
# 默认 ChatClient 显式绑定 redisChatMemory，JDBC 记忆作为候选能力保留
# 需要 JDBC 记忆时，由业务显式注入 jdbcChatMemory 并创建专用 ChatClient
# max-messages 控制 MessageWindowChatMemory 最多保留多少条消息
# 该值不是 Redis / JDBC 底层存储容量上限，而是进入对话记忆窗口的消息数量
metax.ai.chat.memory.max-messages=30

# Redis ChatMemory 使用 Spring AI Alibaba Redis Repository，作为必须保留的默认记忆方案
# JDBC ChatMemory 使用 Spring AI 官方 JdbcChatMemoryRepository 自动装配

# Redis ChatMemory 复用 spring.data.redis 连接信息
# Redis ChatMemory 当前使用 database = 3，keyPrefix = chat:memory:meta
# Redis 适合低延迟会话上下文、短期记忆和高并发读写场景

# JDBC ChatMemory 复用 spring.datasource 连接信息
# JDBC 适合审计、备份、SQL 查询、跨实例稳定持久化和企业数据治理场景
# 同一个运行环境只启用一种 JDBC 数据库，MySQL 和 PostgreSQL 通过配置文件或 profile 切换

# JDBC ChatMemory Schema 初始化策略
# embedded：仅嵌入式数据库自动初始化
# always：开发环境每次启动检查并初始化
# never：生产环境推荐值，交给 Flyway / Liquibase 等受控迁移工具
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.ai.chat.memory.repository.jdbc.platform=mysql
# spring.ai.chat.memory.repository.jdbc.platform=postgresql
# spring.ai.chat.memory.repository.jdbc.schema=classpath:org/springframework/ai/chat/memory/repository/jdbc/schema-mysql.sql
# spring.ai.chat.memory.repository.jdbc.schema=classpath:org/springframework/ai/chat/memory/repository/jdbc/schema-postgresql.sql

# 完整聊天历史归档
# ChatMemory 只负责模型上下文窗口，max-messages 超出后旧消息会从 ChatMemoryRepository 中被裁剪
# ChatHistory 负责用户可查看的完整历史，支持分页查询、审计和后续导出
# MyBatis Plus 负责 ChatHistory 业务 CRUD，JPA 只用于开发期自动建表和结构校验

# JPA 配置
# update：开发环境自动创建或更新表结构
# validate：生产环境推荐值，只校验表结构，不自动修改数据库
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false


# MySQL ChatMemory datasource 示例
spring.datasource.url=jdbc:mysql://localhost:3306/meta_ai?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=MetaAI-HikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# PostgreSQL ChatMemory datasource 示例
# spring.datasource.url=jdbc:postgresql://localhost:5432/meta_ai
# spring.datasource.username=postgres
# spring.datasource.password=123456
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.hikari.pool-name=MetaAI-HikariPool
# spring.datasource.hikari.maximum-pool-size=10
# spring.datasource.hikari.minimum-idle=2
# spring.datasource.hikari.connection-timeout=30000
# spring.datasource.hikari.idle-timeout=600000
# spring.datasource.hikari.max-lifetime=1800000

# ======================================================================================================================
# ================================================= Redis VectorStore ==================================================
# ======================================================================================================================
# 开发环境可自动初始化 schema，生产环境建议改为 false 并通过受控迁移流程创建索引
spring.ai.vectorstore.redis.initialize-schema=true
spring.ai.vectorstore.redis.index-name=metax-rag-index
spring.ai.vectorstore.redis.prefix=metax:rag:

# Redis metadata 字段规范
# Spring AI 1.1.7 官方 Redis 自动配置没有暴露 metadataFields 配置项
# 当前项目通过 MetaRedisVectorStoreConfig 轻量覆盖默认 vectorStore Bean，并补齐下面这些过滤字段
# TAG：tenantId、knowledgeBaseId、documentId、documentType、chunkId、contentHash
# TEXT：source
# NUMERIC：createdAt、chunkIndex
# 写入 Document.metadata 示例
# tenantId=t1
# knowledgeBaseId=kb1
# documentId=doc-001
# documentType=markdown
# source=docs/spring-ai/redis.md
# createdAt=1710000000000
# chunkId=doc-001:0
# chunkIndex=0
# contentHash=md5
# filterExpression 示例
# tenantId == 't1' && knowledgeBaseId == 'kb1'
# documentType == 'markdown' && createdAt >= 1710000000000

# ======================================================================================================================
# ======================================================= Qdrant =======================================================
# ======================================================================================================================
# docker run -d --name qdrant -p 6333:6333 -p 6334:6334 -v ${PWD}\docker-data\qdrant:/qdrant/storage qdrant/qdrant:v1.18
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.api-key=
spring.ai.vectorstore.qdrant.use-tls=false

# ======================================================================================================================
# ================================================ Qdrant VectorStore ==================================================
# ======================================================================================================================
# 开发环境可自动初始化 collection，生产环境建议改为 false 并通过受控迁移流程创建 collection
spring.ai.vectorstore.qdrant.initialize-schema=true
spring.ai.vectorstore.qdrant.collection-name=metax_rag_qdrant

# Qdrant metadata key 规范
# Qdrant payload 不需要 Redis MetadataField 类型声明
# 写入 Document.metadata 的 key 必须与 Redis / Milvus 保持一致，便于统一 filterExpression
# 写入 Document.metadata 示例
# tenantId=t1
# knowledgeBaseId=kb1
# documentId=doc-001
# documentType=markdown
# source=docs/spring-ai/qdrant.md
# createdAt=1710000000000
# chunkId=doc-001:0
# chunkIndex=0
# contentHash=md5
# filterExpression 示例
# tenantId == 't1' && knowledgeBaseId == 'kb1'
# documentType == 'markdown' && createdAt >= 1710000000000

# ======================================================================================================================
# ======================================================= Milvus =======================================================
# ======================================================================================================================
spring.ai.vectorstore.milvus.client.host=localhost
spring.ai.vectorstore.milvus.client.port=19530
spring.ai.vectorstore.milvus.client.username=
spring.ai.vectorstore.milvus.client.password=
spring.ai.vectorstore.milvus.client.secure=false

# ======================================================================================================================
# ================================================= Milvus VectorStore =================================================
# ======================================================================================================================
# 开发环境可自动初始化 collection，生产环境建议改为 false 并通过受控迁移流程创建 collection
spring.ai.vectorstore.milvus.initialize-schema=true
spring.ai.vectorstore.milvus.database-name=default
spring.ai.vectorstore.milvus.collection-name=metax_rag_milvus
spring.ai.vectorstore.milvus.embedding-dimension=1024
spring.ai.vectorstore.milvus.index-type=IVF_FLAT
spring.ai.vectorstore.milvus.metric-type=COSINE

# embedding-dimension 必须与对应 EmbeddingModel 的实际输出维度一致
# DashScope / OpenAI 当前示例按 text-embedding-v3 1024 维规划，若配置 dimensions 变化必须同步修改
# Ollama 当前本地示例按 bge-m3 1024 维规划，替换模型时必须同步修改 collection 维度
# Redis / Qdrant / Milvus 中已有旧 embedding 模型写入的数据不能复用，切换模型后必须重建索引并重新入库
# Milvus metadata key 规范
# Milvus metadata 不需要 Redis MetadataField 类型声明
# 写入 Document.metadata 的 key 必须与 Redis / Qdrant 保持一致，便于统一 filterExpression
# 写入 Document.metadata 示例
# tenantId=t1
# knowledgeBaseId=kb1
# documentId=doc-001
# documentType=markdown
# source=docs/spring-ai/milvus.md
# createdAt=1710000000000
# chunkId=doc-001:0
# chunkIndex=0
# contentHash=md5
# filterExpression 示例
# tenantId == 't1' && knowledgeBaseId == 'kb1'
# documentType == 'markdown' && createdAt >= 1710000000000

# ======================================================================================================================
# =============================================== RAG ETL / Retrieval ==================================================
# ======================================================================================================================
# RAG 文档入库链路：对象存储原始文件 -> ResourceFactory -> DocumentReader -> Transformer 链路 -> Snapshot -> VectorStore upsert
# Transformer 链路：document metadata -> TokenTextSplitter -> chunk metadata -> ContentFormatTransformer
# RAG 查询链路：ChatController -> RetrievalOptions -> RetrievalAugmentationAdvisor -> ChatModel
# RetrievalAugmentationAdvisor 内部顺序：optional QueryTransformer -> VectorStoreDocumentRetriever -> DocumentPostProcessor -> ContextualQueryAugmenter
# topK 和 similarityThreshold 是默认检索参数，details 接口可以按请求覆盖
# 普通 RAG 查询必须传 tenantId 和 knowledgeBaseId，避免无过滤全库检索
# 文档存储按接口接入，当前默认使用 RustFS，兼容 MinIO 等 S3 协议对象存储
# 生产环境必须改成真实账号并使用环境变量托管密钥
metax.ai.rag.chunk.size=800
metax.ai.rag.chunk.min-chars=350
metax.ai.rag.chunk.min-length-to-embed=20
metax.ai.rag.chunk.max-num-chunks=10000
metax.ai.rag.chunk.keep-separator=true

# ETL 快照导出
# 基于 Spring AI 官方 FileDocumentWriter，把 Reader 和 Transformer 处理后的 Document 写入本地文件
# 快照用于排查 chunk 切分、metadata、ContentFormatter 和 metadataMode，不作为向量库索引成功凭证
# 默认关闭，避免生产环境把知识库内容无意落盘
# metadata-mode 可选 ALL、EMBED、INFERENCE、NONE
# ALL 适合排查 metadata 和格式化结果，EMBED 更接近 embedding 输入，NONE 只查看纯文本
metax.ai.rag.snapshot.enabled=false
metax.ai.rag.snapshot.output-dir=D:/meta-ai/rag-snapshots
metax.ai.rag.snapshot.with-document-markers=true
metax.ai.rag.snapshot.metadata-mode=ALL
metax.ai.rag.snapshot.append=false

metax.ai.rag.retrieval.top-k=5
metax.ai.rag.retrieval.similarity-threshold=0.50
# 空上下文策略
# true：知识库优先，检索不到上下文时允许模型基于通用能力、系统提示词和会话上下文回答
# false：严格 RAG，检索不到上下文时拒答，适合只允许知识库回答的场景
metax.ai.rag.retrieval.allow-empty-context=true
# 权限过滤开关：默认关闭，先恢复只按 tenantId / knowledgeBaseId 的基础知识库召回
# 开启后会追加 visibility / deptId / userId 过滤，适合权限 metadata 和历史数据完全统一之后使用
metax.ai.rag.retrieval.permission-filter-enabled=false

# 普通 /v1/rag 检索门控
# rule：只使用规则判断，hybrid：规则未知时调用 ChatModel 判断，llm：全部交给 ChatModel 判断
# details / search 排查接口不经过该门控，始终强制检索
# 检索决策复用当前配置选中的 ChatModel，不额外创建独立路由模型
# Ollama / Qwen3 做短分类时由 RetrievalDecisionService 显式关闭 thinking，避免 answer 为空
metax.ai.rag.retrieval.decision.mode=hybrid
metax.ai.rag.retrieval.decision.temperature=0.0
metax.ai.rag.retrieval.decision.max-tokens=30

# 检索前 query 转换
# none：不转换，默认低延迟
# compression：适合多轮追问，把会话历史和追问压缩为独立检索 query
# rewrite：适合单轮检索优化，把口语化或歧义 query 改写为更适合向量检索的 query
# query 转换会额外调用一次 ChatModel，生产环境需要结合延迟和成本按场景开启
# query 转换使用当前配置选中的 ChatModel，避免检索前改写和最终回答使用不同模型
metax.ai.rag.retrieval.query-transformer.enabled=false
metax.ai.rag.retrieval.query-transformer.mode=none
metax.ai.rag.retrieval.query-transformer.temperature=0.0
metax.ai.rag.retrieval.query-transformer.max-tokens=512
metax.ai.rag.retrieval.query-transformer.target-search-system=vector store

# 检索后文档处理
# 去重按 chunkId 优先，缺失时按 contentHash 兜底
# max-context-documents 控制最终进入上下文的 chunk 数量
# max-context-chars 控制最终进入上下文的文本总长度
# rerank-enabled 第一版只保留扩展开关，后续可接 cross-encoder 或第三方 rerank 模型
# 当前 rerank 使用 NoOpDocumentReranker 空实现，不改变排序也不计算 rerankScore
# DocumentPostProcessor 位于 VectorStore 召回之后、ContextualQueryAugmenter 注入上下文之前
metax.ai.rag.retrieval.post-processor.enabled=true
metax.ai.rag.retrieval.post-processor.deduplicate-enabled=true
metax.ai.rag.retrieval.post-processor.rerank-enabled=false
metax.ai.rag.retrieval.post-processor.max-context-documents=5
metax.ai.rag.retrieval.post-processor.max-context-chars=12000

# RAG 检索链路可观测性
# details 接口返回 query、transformedQuery、filter、topK、threshold、召回数量和阶段耗时
# 普通接口只返回模型回答，不暴露 trace
# trace 只用于排查检索链路，不参与模型 prompt 构造
metax.ai.rag.retrieval.observability.enabled=true

metax.ai.rag.ingestion.redis-key-prefix=rag:ingestion:run:
metax.ai.rag.ingestion.run-ttl-seconds=86400

# RAG 文档存储
# provider=object：使用对象存储，当前默认 RustFS，兼容 MinIO 等 S3 协议对象存储
# provider=legacy：预留给老系统文件服务适配器，启用前需要提供对应 DocumentStorageService 实现
# RustFS 示例 endpoint：http://localhost:9000
# MinIO 示例 endpoint：http://localhost:9000
# docker run -d --name rustfs -p 9000:9000 -p 9001:9001 -v ${PWD}\docker-data\rustfs:/data -e RUSTFS_ADDRESS=:9000 -e RUSTFS_ACCESS_KEY=rustfsadmin -e RUSTFS_SECRET_KEY=rustfsadmin -e RUSTFS_CONSOLE_ENABLE=true rustfs/rustfs:1.0.0-beta.6 /data
metax.ai.rag.storage.provider=object
metax.ai.rag.storage.endpoint=http://localhost:9000
metax.ai.rag.storage.bucket=meta-ai-knowledge
# 本地开发可开启，启动时自动检查并创建默认 bucket
# 生产环境建议保持 false，由部署脚本或运维流程创建 bucket
metax.ai.rag.storage.initialize-bucket=true
metax.ai.rag.storage.access-key=${RAG_STORAGE_ACCESS_KEY:rustfsadmin}
metax.ai.rag.storage.secret-key=${RAG_STORAGE_SECRET_KEY:rustfsadmin}
metax.ai.rag.storage.region=us-east-1
metax.ai.rag.storage.local-root=D:/meta-ai/knowledge

metax.debug.print-ai-beans=true
