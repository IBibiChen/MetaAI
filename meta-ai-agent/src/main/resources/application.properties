spring.application.name=Meta-AI-AGENT

server.port=8008

# ======================================================================================================================
# ================================================= Application / Web ==================================================
# ======================================================================================================================
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.charset=UTF-8

# ======================================================================================================================
# ============================================= Spring AI Global Strategy ==============================================
# ======================================================================================================================
# 多 ChatModel 共存时关闭 ChatClient.Builder 自动装配，改由 ChatClientConfig 按具体 ChatModel 手动构造
spring.ai.chat.client.enabled=false

# 不要配置 spring.ai.model.chat
# 该属性是 ChatModel provider 单选开关，设置后会关闭未选中的 provider 自动装配
# 当前项目需要 DashScope / Ollama / OpenAI 三套 ChatModel 同时存在

# 不要配置 spring.ai.model.embedding
# 该属性是 EmbeddingModel provider 单选开关，设置后会关闭未选中的 provider 自动装配
# 当前项目需要 DashScope / Ollama / OpenAI 三套 EmbeddingModel 同时存在

# Advisor 日志仅建议开发环境开启，生产环境避免输出 prompt / completion 敏感内容
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# ======================================================================================================================
# ================================================= DashScope Provider =================================================
# ======================================================================================================================
spring.ai.dashscope.enabled=true
spring.ai.dashscope.api-key=${DASH_SCOPE_API_KEY}
spring.ai.dashscope.base-url=https://dashscope.aliyuncs.com
spring.ai.dashscope.read-timeout=60000

# DashScope Chat
spring.ai.dashscope.chat.enabled=true
spring.ai.dashscope.chat.options.model=qwen-plus
spring.ai.dashscope.chat.options.temperature=0.7
spring.ai.dashscope.chat.options.top-p=0.8
spring.ai.dashscope.chat.options.top-k=50
spring.ai.dashscope.chat.options.max-tokens=2048
spring.ai.dashscope.chat.options.enable-search=false
spring.ai.dashscope.chat.options.incremental-output=true
spring.ai.dashscope.chat.options.repetition-penalty=1.1

# DashScope Embedding
spring.ai.dashscope.embedding.enabled=true
spring.ai.dashscope.embedding.metadata-mode=EMBED
spring.ai.dashscope.embedding.options.model=text-embedding-v3
# text-embedding-v3 支持按需指定维度，不需要时留空不要配置
# spring.ai.dashscope.embedding.options.dimensions=1024
# text_type 可按写入 / 查询场景在调用侧覆盖，默认不固定
# spring.ai.dashscope.embedding.options.text-type=document

# ======================================================================================================================
# ================================================== Ollama Provider ===================================================
# ======================================================================================================================
spring.ai.ollama.base-url=http://localhost:11434

# Ollama Chat
spring.ai.ollama.chat.options.model=qwen2.5:7b
spring.ai.ollama.chat.options.temperature=0.7
spring.ai.ollama.chat.options.top-p=0.9
spring.ai.ollama.chat.options.top-k=40
spring.ai.ollama.chat.options.num-predict=2048
spring.ai.ollama.chat.options.num-ctx=8192
spring.ai.ollama.chat.options.repeat-penalty=1.1
spring.ai.ollama.chat.options.keep-alive=10m

# Ollama Embedding
spring.ai.ollama.embedding.options.model=nomic-embed-text
spring.ai.ollama.embedding.options.keep-alive=10m
spring.ai.ollama.embedding.options.truncate=true

# Ollama Model Initialization
# 生产环境不建议启动时自动拉模型，避免应用启动被模型下载阻塞
spring.ai.ollama.init.pull-model-strategy=never
spring.ai.ollama.init.timeout=5m
spring.ai.ollama.init.max-retries=0
spring.ai.ollama.init.chat.include=true
spring.ai.ollama.init.embedding.include=true

# ======================================================================================================================
# ================================================== OpenAI Provider ===================================================
# ======================================================================================================================
# 可对接 OpenAI 官方 API，也可对接 vLLM / TEI / LocalAI 等 OpenAI 兼容服务
spring.ai.openai.base-url=http://localhost:8000/v1
spring.ai.openai.api-key=not-needed

# OpenAI Chat
spring.ai.openai.chat.base-url=http://localhost:8000/v1
spring.ai.openai.chat.completions-path=/v1/chat/completions
spring.ai.openai.chat.options.model=Qwen2.5-7B-Instruct
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.top-p=0.9
spring.ai.openai.chat.options.max-tokens=2048

# OpenAI Embedding
spring.ai.openai.embedding.base-url=http://localhost:8080/v1
spring.ai.openai.embedding.embeddings-path=/v1/embeddings
spring.ai.openai.embedding.metadata-mode=EMBED
spring.ai.openai.embedding.options.model=text-embedding-v3
# 对接 text-embedding-3 或兼容服务需要固定维度时再打开
# spring.ai.openai.embedding.options.dimensions=1024

# vLLM / OpenAI-compatible extra body examples
# spring.ai.openai.chat.options.extra-body.top_k=40
# spring.ai.openai.chat.options.extra-body.repetition_penalty=1.1

# ======================================================================================================================
# ======================================================= Redis ========================================================
# ======================================================================================================================
spring.data.redis.host=localhost
spring.data.redis.port=6399
spring.data.redis.username=default
spring.data.redis.password=123456
spring.data.redis.timeout=5000
spring.data.redis.connect-timeout=5000

# Redis 客户端边界
# RedisTemplate：普通 Redis KV / Hash / List 数据访问
# JedisPooled：Spring AI RedisVectorStore 向量库专用客户端

# ======================================================================================================================
# ================================================== Chat Memory ======================================================
# ======================================================================================================================
# 当前项目同时保留 Redis ChatMemory 和 JDBC ChatMemory
# Redis ChatMemory 使用 Spring AI Alibaba Redis Repository，作为必须保留的默认记忆方案
# JDBC ChatMemory 使用 Spring AI 官方 JdbcChatMemoryRepository 自动装配
# ChatClient 不让 Spring 隐式选择记忆后端，而是按 Bean 名显式绑定 redisChatMemory 或 jdbcChatMemory
# 对外调用时通过 memory 参数手动选择 redis 或 jdbc

# Redis ChatMemory 复用 spring.data.redis 连接信息
# Redis ChatMemory 当前使用 database = 3，keyPrefix = chat:memory:meta
# Redis 适合低延迟会话上下文、短期记忆和高并发读写场景

# JDBC ChatMemory 复用 spring.datasource 连接信息
# JDBC 适合审计、备份、SQL 查询、跨实例稳定持久化和企业数据治理场景
# 同一个运行环境只启用一种 JDBC 数据库，MySQL 和 PostgreSQL 通过配置文件或 profile 切换

# JDBC ChatMemory Schema 初始化策略
# embedded：仅嵌入式数据库自动初始化
# always：开发环境每次启动检查并初始化
# never：生产环境推荐值，交给 Flyway / Liquibase 等受控迁移工具
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.ai.chat.memory.repository.jdbc.platform=mysql
# spring.ai.chat.memory.repository.jdbc.platform=postgresql
# spring.ai.chat.memory.repository.jdbc.schema=classpath:org/springframework/ai/chat/memory/repository/jdbc/schema-mysql.sql
# spring.ai.chat.memory.repository.jdbc.schema=classpath:org/springframework/ai/chat/memory/repository/jdbc/schema-postgresql.sql

# MySQL ChatMemory datasource 示例
spring.datasource.url=jdbc:mysql://localhost:3306/meta_ai?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=MetaAI-HikariPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# PostgreSQL ChatMemory datasource 示例
# spring.datasource.url=jdbc:postgresql://localhost:5432/meta_ai
# spring.datasource.username=postgres
# spring.datasource.password=123456
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.hikari.pool-name=MetaAI-HikariPool
# spring.datasource.hikari.maximum-pool-size=10
# spring.datasource.hikari.minimum-idle=2
# spring.datasource.hikari.connection-timeout=30000
# spring.datasource.hikari.idle-timeout=600000
# spring.datasource.hikari.max-lifetime=1800000

# ======================================================================================================================
# ================================================= Redis VectorStore ==================================================
# ======================================================================================================================
# 开发环境可自动初始化 schema，生产环境建议改为 false 并通过受控迁移流程创建索引
spring.ai.vectorstore.redis.initialize-schema=true

# 三套 RedisVectorStore 共用 metadata 字段规范
# TAG：tenantId、knowledgeBaseId、documentId、documentType、chunkId、contentHash
# TEXT：source
# NUMERIC：createdAt、chunkIndex
# 写入 Document.metadata 示例
# tenantId=t1
# knowledgeBaseId=kb1
# documentId=doc-001
# documentType=markdown
# source=docs/spring-ai/redis.md
# createdAt=1710000000000
# chunkId=doc-001:0
# chunkIndex=0
# contentHash=md5
# filterExpression 示例
# tenantId == 't1' && knowledgeBaseId == 'kb1'
# documentType == 'markdown' && createdAt >= 1710000000000

metax.ai.vectorstore.redis.dashscope.index-name=metax-dashscope-index
metax.ai.vectorstore.redis.dashscope.prefix=dashscope:rag:

metax.ai.vectorstore.redis.ollama.index-name=metax-ollama-index
metax.ai.vectorstore.redis.ollama.prefix=ollama:rag:

metax.ai.vectorstore.redis.openai.index-name=metax-openai-index
metax.ai.vectorstore.redis.openai.prefix=openai:rag:

# ======================================================================================================================
# ======================================================= Qdrant =======================================================
# ======================================================================================================================
spring.ai.vectorstore.qdrant.host=localhost
spring.ai.vectorstore.qdrant.port=6334
spring.ai.vectorstore.qdrant.api-key=
spring.ai.vectorstore.qdrant.use-tls=false

# ======================================================================================================================
# ================================================ Qdrant VectorStore =================================================
# ======================================================================================================================
# 开发环境可自动初始化 collection，生产环境建议改为 false 并通过受控迁移流程创建 collection
spring.ai.vectorstore.qdrant.initialize-schema=true

# 三套 QdrantVectorStore 共用 metadata key 规范
# Qdrant payload 不需要 Redis MetadataField 类型声明
# 写入 Document.metadata 的 key 必须与 Redis / Milvus 保持一致，便于统一 filterExpression
# 写入 Document.metadata 示例
# tenantId=t1
# knowledgeBaseId=kb1
# documentId=doc-001
# documentType=markdown
# source=docs/spring-ai/qdrant.md
# createdAt=1710000000000
# chunkId=doc-001:0
# chunkIndex=0
# contentHash=md5
# filterExpression 示例
# tenantId == 't1' && knowledgeBaseId == 'kb1'
# documentType == 'markdown' && createdAt >= 1710000000000

metax.ai.vectorstore.qdrant.dashscope.collection-name=metax_dashscope_qdrant

metax.ai.vectorstore.qdrant.ollama.collection-name=metax_ollama_qdrant

metax.ai.vectorstore.qdrant.openai.collection-name=metax_openai_qdrant

# ======================================================================================================================
# ======================================================= Milvus =======================================================
# ======================================================================================================================
spring.ai.vectorstore.milvus.client.host=localhost
spring.ai.vectorstore.milvus.client.port=19530
spring.ai.vectorstore.milvus.client.username=
spring.ai.vectorstore.milvus.client.password=
spring.ai.vectorstore.milvus.client.secure=false

# ======================================================================================================================
# ================================================= Milvus VectorStore =================================================
# ======================================================================================================================
# 开发环境可自动初始化 collection，生产环境建议改为 false 并通过受控迁移流程创建 collection
spring.ai.vectorstore.milvus.initialize-schema=true

# embedding-dimension 必须与对应 EmbeddingModel 的实际输出维度一致
# DashScope / OpenAI 当前示例按 text-embedding-v3 1024 维规划，若配置 dimensions 变化必须同步修改
# Ollama nomic-embed-text 常见输出维度为 768，替换模型时必须同步修改 collection 维度
# 三套 MilvusVectorStore 共用 metadata key 规范
# Milvus metadata 不需要 Redis MetadataField 类型声明
# 写入 Document.metadata 的 key 必须与 Redis / Qdrant 保持一致，便于统一 filterExpression
# 写入 Document.metadata 示例
# tenantId=t1
# knowledgeBaseId=kb1
# documentId=doc-001
# documentType=markdown
# source=docs/spring-ai/milvus.md
# createdAt=1710000000000
# chunkId=doc-001:0
# chunkIndex=0
# contentHash=md5
# filterExpression 示例
# tenantId == 't1' && knowledgeBaseId == 'kb1'
# documentType == 'markdown' && createdAt >= 1710000000000

metax.ai.vectorstore.milvus.dashscope.database-name=default
metax.ai.vectorstore.milvus.dashscope.collection-name=metax_dashscope_milvus
metax.ai.vectorstore.milvus.dashscope.embedding-dimension=1024

metax.ai.vectorstore.milvus.ollama.database-name=default
metax.ai.vectorstore.milvus.ollama.collection-name=metax_ollama_milvus
metax.ai.vectorstore.milvus.ollama.embedding-dimension=768

metax.ai.vectorstore.milvus.openai.database-name=default
metax.ai.vectorstore.milvus.openai.collection-name=metax_openai_milvus
metax.ai.vectorstore.milvus.openai.embedding-dimension=1024

# ======================================================================================================================
# =============================================== RAG ETL / Retrieval ================================================
# ======================================================================================================================
# RAG 文档入库链路：RustFS 原始文件 -> DocumentReader -> TokenTextSplitter -> VectorStore
# RAG 查询链路：ChatController -> RetrievalOptions -> RetrievalAugmentationAdvisor -> ChatModel
# RetrievalAugmentationAdvisor 内部顺序：QueryTransformer -> VectorStoreDocumentRetriever -> DocumentPostProcessor -> ContextualQueryAugmenter
# topK 和 similarityThreshold 是默认检索参数，details 接口可以按请求覆盖
# 普通 RAG 查询必须传 tenantId 和 knowledgeBaseId，避免无过滤全库检索
# RustFS 按 S3 兼容协议接入，生产环境必须改成真实账号并使用环境变量托管密钥
metax.ai.rag.chunk.size=800
metax.ai.rag.chunk.min-chars=350
metax.ai.rag.chunk.min-length-to-embed=20
metax.ai.rag.chunk.max-num-chunks=10000
metax.ai.rag.chunk.keep-separator=true
metax.ai.rag.retrieval.top-k=5
metax.ai.rag.retrieval.similarity-threshold=0.50

# 检索前 query 转换
# none：不转换，默认低延迟
# compression：适合多轮追问，把会话历史和追问压缩为独立检索 query
# rewrite：适合单轮检索优化，把口语化或歧义 query 改写为更适合向量检索的 query
# query 转换会额外调用一次 ChatModel，生产环境需要结合延迟和成本按场景开启
# query 转换使用当前 provider 对应的 ChatModel，避免多模型环境下选错模型
metax.ai.rag.retrieval.query-transformer.enabled=false
metax.ai.rag.retrieval.query-transformer.mode=none
metax.ai.rag.retrieval.query-transformer.temperature=0.0
metax.ai.rag.retrieval.query-transformer.max-tokens=512
metax.ai.rag.retrieval.query-transformer.target-search-system=vector store

# 检索后文档处理
# 去重按 chunkId 优先，缺失时按 contentHash 兜底
# max-context-documents 控制最终进入上下文的 chunk 数量
# max-context-chars 控制最终进入上下文的文本总长度
# rerank-enabled 第一版只保留扩展开关，后续可接 cross-encoder 或第三方 rerank 模型
# 当前 rerank 使用 NoOpDocumentReranker 空实现，不改变排序也不计算 rerankScore
# DocumentPostProcessor 位于 VectorStore 召回之后、ContextualQueryAugmenter 注入上下文之前
metax.ai.rag.retrieval.post-processor.enabled=true
metax.ai.rag.retrieval.post-processor.deduplicate-enabled=true
metax.ai.rag.retrieval.post-processor.rerank-enabled=false
metax.ai.rag.retrieval.post-processor.max-context-documents=5
metax.ai.rag.retrieval.post-processor.max-context-chars=12000

# RAG 检索链路可观测性
# details 接口返回 query、transformedQuery、filter、topK、threshold、召回数量和阶段耗时
# 普通接口只返回模型回答，不暴露 trace
# trace 只用于排查检索链路，不参与模型 prompt 构造
metax.ai.rag.retrieval.observability.enabled=true

metax.ai.rag.ingestion.redis-key-prefix=rag:ingestion:job:
metax.ai.rag.ingestion.job-ttl-seconds=86400
metax.ai.rag.storage.endpoint=http://localhost:9000
metax.ai.rag.storage.bucket=meta-ai-knowledge
metax.ai.rag.storage.access-key=${RUSTFS_ACCESS_KEY:rustfsadmin}
metax.ai.rag.storage.secret-key=${RUSTFS_SECRET_KEY:rustfsadmin}
metax.ai.rag.storage.region=us-east-1
