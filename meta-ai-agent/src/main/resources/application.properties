spring.application.name=Meta-AI-AGENT

server.port=8008

# 大模型对话中文乱码 UTF8 编码处理
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.charset=UTF-8

# =========SpringAI Config=========
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# 多 ChatClient: 关闭 ChatClient.Builder 自动装配 (多 ChatModel 共存时必须), 改由 ChatClientConfig 手动构造
spring.ai.chat.client.enabled=false
# 关闭所有自动装配 embedding, 仅保留手写的两个 EmbeddingModel, 消除 EmbeddingModel 歧义
spring.ai.model.embedding=none
# 切勿设置 spring.ai.model.chat: 它是单选开关, 设值会关掉其它 provider 的 chat 自动装配,
# 导致 DashScope / Ollama / OpenAI 三模型无法共存。保持不配置 = 三者默认都装配。

# =========SpringAIAlibaba Config=========
spring.ai.dashscope.api-key=${DASH_SCOPE_API_KEY}
#spring.ai.dashscope.base-url=https://dashscope.aliyuncs.com
spring.ai.dashscope.chat.options.model=qwen-plus
spring.ai.dashscope.embedding.options.model=text-embedding-v3

# =========Redis Stack=========
spring.data.redis.host=localhost
spring.data.redis.port=6399
spring.data.redis.username=default
spring.data.redis.password=123456
spring.data.redis.timeout=5000

# =========Ollama=========
spring.ai.ollama.base-url=http://localhost:11434

# =========vLLM (OpenAI 兼容接口)=========
spring.ai.openai.base-url=http://localhost:8000/v1
spring.ai.openai.api-key=${VLLM_API_KEY:not-needed}
spring.ai.openai.chat.options.model=Qwen2.5-7B-Instruct
# vLLM 专属采样参数 (可选): spring.ai.openai.chat.options.extra-body.top_k=40

# =========Redis Stack Vector Store=========
spring.ai.vectorstore.redis.initialize-schema=true
spring.ai.vectorstore.redis.index-name=custom-index
spring.ai.vectorstore.redis.prefix=custom-prefix
