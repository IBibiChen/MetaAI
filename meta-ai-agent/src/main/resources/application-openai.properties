# OpenAI profile
# 启用方式：spring.profiles.active=openai

spring.ai.model.chat=openai
spring.ai.model.embedding=openai

# ======================================================================================================================
# ================================================== OpenAI Provider ===================================================
# ======================================================================================================================
# 可对接 OpenAI 官方 API，也可对接 vLLM / TEI / LocalAI 等 OpenAI 兼容服务
spring.ai.openai.base-url=http://localhost:8000/v1
spring.ai.openai.api-key=not-needed

# OpenAI Chat
spring.ai.openai.chat.base-url=http://localhost:8000/v1
spring.ai.openai.chat.completions-path=/v1/chat/completions
spring.ai.openai.chat.options.model=Qwen2.5-7B-Instruct
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.top-p=0.9
spring.ai.openai.chat.options.max-tokens=2048

# OpenAI Embedding
spring.ai.openai.embedding.base-url=http://localhost:8080/v1
spring.ai.openai.embedding.embeddings-path=/v1/embeddings
spring.ai.openai.embedding.metadata-mode=EMBED
spring.ai.openai.embedding.options.model=text-embedding-v3
# 对接 text-embedding-3 或兼容服务需要固定维度时再打开
# spring.ai.openai.embedding.options.dimensions=1024

# vLLM / OpenAI-compatible extra body examples
# spring.ai.openai.chat.options.extra-body.top_k=40
# spring.ai.openai.chat.options.extra-body.repetition_penalty=1.1
